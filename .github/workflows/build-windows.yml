name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller build_installer.spec

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build MSIX package
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Filter makeappx.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path msix-build\Assets | Out-Null
          Copy-Item dist\StickityStacks.exe       msix-build\
          Copy-Item msix\Package.appxmanifest     msix-build\
          Copy-Item msix\Assets\*                 msix-build\Assets\
          & $makeappx.FullName pack /d msix-build /p installer_output\StickityStacks.msix /nv
          Write-Host "MSIX created: $(Get-Item installer_output\StickityStacks.msix | Select-Object -ExpandProperty Length) bytes"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StickityStacks-Windows-Installer
          path: installer_output/*.exe
          retention-days: 30

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: StickityStacks-MSIX
          path: installer_output/*.msix
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/*.exe
            installer_output/*.msix

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
